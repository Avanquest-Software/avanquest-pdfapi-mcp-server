name: Build MCPB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Pack MCPB
        run: |
          npm install -g @anthropic-ai/mcpb@2.1.2
          mcpb pack . avanquest-pdfapi-mcp-server.mcpb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avanquest-pdfapi-mcp-server
          path: avanquest-pdfapi-mcp-server.mcpb

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" avanquest-pdfapi-mcp-server.mcpb
